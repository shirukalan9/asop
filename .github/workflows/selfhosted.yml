#
# Crave AOSP Builder - Self Hosted
# Simplified for single user, AOSP base (projectID 35)
#

name: Crave Builder

on:
  workflow_dispatch:
    inputs:

      ROM_FOLDER:
        description: 'Nama folder ROM di /crave-devspaces/ (isi manual, cek dulu via /status di bot)'
        required: true
        default: 'axion'

      IS_NEW_ROM:
        description: 'Setup ROM baru? (repo init + crave set akan dijalankan)'
        required: true
        default: 'no'
        type: choice
        options:
          - 'no'
          - 'yes'

      BUILD_SCRIPT_URL:
        description: 'URL raw script build (bash)'
        required: true
        default: 'https://raw.githubusercontent.com/USERNAME/REPO/main/scripts/axion.sh'

      DEVICE_NAME:
        description: 'Device codename (untuk crave pull dan notif)'
        required: true
        default: 'X6882'

      CLEAN_BUILD:
        description: 'Hapus out/ sebelum build?'
        required: true
        default: 'no'
        type: choice
        options:
          - 'no'
          - 'yes'

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: Start/restart self-hosted runner
  # Jalan di GH server, masuk devspace via crave,
  # jalanin runner di tmux
  # ─────────────────────────────────────────────
  Start-Runner:
    name: Start Self-Hosted Runner
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install tmux
        run: sudo apt-get install -y tmux

      - name: Setup crave
        run: |
          mkdir -p ${HOME}/bin/
          curl -s https://raw.githubusercontent.com/accupara/crave/master/get_crave.sh | bash -s --
          mv ${PWD}/crave ${HOME}/bin/
          sudo ln -sf /home/${USER}/bin/crave /usr/bin/crave
          envsubst < ${PWD}/crave.conf.sample >> ${PWD}/crave.conf
          rm -rf ${PWD}/crave.conf.sample
        env:
          CRAVE_USERNAME: ${{ secrets.CRAVE_USERNAME }}
          CRAVE_TOKEN: ${{ secrets.CRAVE_TOKEN }}

      - name: Start runner in devspace
        run: |
          crave -n devspace -- "
            if [ -f actions-runner/run.sh ]; then
              echo 'Runner found!'
            else
              echo 'ERROR: Runner not found! Run configure-runner workflow first.'
              exit 1
            fi

            if tmux has-session -t ghactions 2>/dev/null; then
              echo 'Runner already running, skipping.'
            else
              tmux new-session -d -s ghactions
              tmux send-keys -t ghactions './actions-runner/run.sh' Enter
              echo 'Runner started.'
            fi
          "

  # ─────────────────────────────────────────────
  # JOB 2: Build
  # Jalan di self-hosted runner (di dalam devspace)
  # ─────────────────────────────────────────────
  build:
    name: Build ROM
    needs: Start-Runner
    runs-on: self-hosted
    concurrency:
      group: ${{ github.repository_owner }}
    steps:

      - name: Checkout
        uses: actions/checkout@v4

      # Notif ke Telegram: build masuk queue
      - name: Notify queue
        continue-on-error: true
        run: |
          curl -s -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage \
            -d chat_id=${{ secrets.TELEGRAM_TO }} \
            -d parse_mode="Markdown" \
            -d text="⏳ *Build Queued*%0ADevice: \`${{ github.event.inputs.DEVICE_NAME }}\`%0AROM: \`${{ github.event.inputs.ROM_FOLDER }}\`%0A[Lihat Run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})"

      - name: Cleanup runner workspace
        run: rm -rf $GITHUB_WORKSPACE/*

      # Setup ROM baru jika IS_NEW_ROM = yes
      - name: Setup new ROM folder (if new)
        if: ${{ github.event.inputs.IS_NEW_ROM == 'yes' }}
        run: |
          ROM_PATH="/crave-devspaces/${{ github.event.inputs.ROM_FOLDER }}"
          
          if [ -d "$ROM_PATH/.repo" ]; then
            echo "Folder sudah ada dan sudah di-repo init, skip setup."
          else
            echo "Setup ROM baru di $ROM_PATH"
            mkdir -p "$ROM_PATH"
            cd "$ROM_PATH"
            repo init \
              -u https://android.googlesource.com/platform/manifest.git \
              -b master \
              --depth=1
            crave set --projectID 35
            echo "Setup selesai."
          fi

      # Validasi folder ROM
      - name: Validate ROM folder
        run: |
          ROM_PATH="/crave-devspaces/${{ github.event.inputs.ROM_FOLDER }}"
          
          if [ ! -d "$ROM_PATH/.repo" ]; then
            echo "ERROR: $ROM_PATH tidak ditemukan atau belum di-repo init!"
            echo "Jalankan workflow dengan IS_NEW_ROM=yes untuk setup pertama kali."
            exit 1
          fi
          
          echo "ROM_PATH=$ROM_PATH" >> $GITHUB_ENV
          echo "ROM folder valid: $ROM_PATH"

      # Push signing keys ke build workspace
      - name: Push signing keys
        run: |
          cd $ROM_PATH
          WORKSPACE_PATH=$(crave ssh -- pwd | grep -v Select | sed 's/\r//g')
          echo "Build workspace: $WORKSPACE_PATH"
          
          crave push /crave-devspaces/vendor/ -d ${WORKSPACE_PATH}/vendor/
          echo "Keys pushed ke $WORKSPACE_PATH/vendor/"

      # Clean out/ jika diminta
      - name: Clean build (if requested)
        if: ${{ github.event.inputs.CLEAN_BUILD == 'yes' }}
        run: |
          cd $ROM_PATH
          crave ssh -- "rm -rf out/" || true
          echo "out/ dibersihkan."

      # Jalankan build via crave run
      - name: Start build
        run: |
          cd $ROM_PATH
          echo "Menjalankan build script: ${{ github.event.inputs.BUILD_SCRIPT_URL }}"
          echo "Device: ${{ github.event.inputs.DEVICE_NAME }}"
          
          crave run --no-patch -- "bash <(curl -s ${{ github.event.inputs.BUILD_SCRIPT_URL }})"
        timeout-minutes: 1440
        env:
          BUILD_SCRIPT_URL: ${{ github.event.inputs.BUILD_SCRIPT_URL }}

      # Upload ROM ke GoFile (hanya kalau sukses)
      - name: Pull & Upload ROM to GoFile
        if: ${{ success() }}
        run: |
          cd $ROM_PATH
          DEVICE="${{ github.event.inputs.DEVICE_NAME }}"

          # Pull semua zip dari build workspace ke devspace
          # Hasilnya landing di $ROM_PATH/$DEVICE/rom.zip
          echo "Pulling zip dari build workspace..."
          crave pull out/target/product/*/*.zip

          # Cari zip paling baru, exclude ota
          LATEST_ZIP=$(find $ROM_PATH -name "*.zip" ! -name "*ota*" \
            -printf "%T@ %p\n" | sort -n | tail -1 | awk '{print $2}')

          if [ -z "$LATEST_ZIP" ]; then
            echo "ERROR: Tidak ada zip ditemukan setelah pull!"
            exit 1
          fi

          echo "ZIP ditemukan: $LATEST_ZIP"

          # Upload ke GoFile
          SERVER=$(curl -s https://api.gofile.io/servers | jq -r '.data.servers[0].name')
          LINK=$(curl -# -F "file=@${LATEST_ZIP}" "https://${SERVER}.gofile.io/uploadFile" \
            | jq -r '.data.downloadPage')

          echo "Upload selesai: $LINK"
          echo "GOFILE_LINK=$LINK" >> $GITHUB_ENV

      # Notif sukses
      - name: Notify success
        if: ${{ success() }}
        continue-on-error: true
        run: |
          curl -s -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage \
            -d chat_id=${{ secrets.TELEGRAM_TO }} \
            -d parse_mode="Markdown" \
            -d text="✅ *Build Sukses!*%0ADevice: \`${{ github.event.inputs.DEVICE_NAME }}\`%0AROM: \`${{ github.event.inputs.ROM_FOLDER }}\`%0A📥 Download: ${{ env.GOFILE_LINK }}%0A[Lihat Run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})"

      # Pull error.log dan kirim ke Telegram (hanya kalau gagal)
      - name: Pull & Send error.log
        if: ${{ failure() }}
        continue-on-error: true
        run: |
          cd $ROM_PATH
          crave pull out/error.log || true

          ERROR_LOG=$(find $ROM_PATH -name "error.log" | head -1)

          if [ -f "$ERROR_LOG" ]; then
            # Kirim file error.log langsung ke Telegram
            curl -s -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendDocument \
              -F chat_id=${{ secrets.TELEGRAM_TO }} \
              -F document=@"$ERROR_LOG" \
              -F caption="❌ Build Gagal - ${{ github.event.inputs.DEVICE_NAME }} (${{ github.event.inputs.ROM_FOLDER }})"
          else
            echo "error.log tidak ditemukan."
          fi

      # Notif gagal
      - name: Notify failure
        if: ${{ failure() }}
        continue-on-error: true
        run: |
          curl -s -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage \
            -d chat_id=${{ secrets.TELEGRAM_TO }} \
            -d parse_mode="Markdown" \
            -d text="❌ *Build Gagal!*%0ADevice: \`${{ github.event.inputs.DEVICE_NAME }}\`%0AROM: \`${{ github.event.inputs.ROM_FOLDER }}\`%0A[Lihat Log](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})"

      # Notif kalau di-cancel
      - name: Notify cancelled
        if: ${{ cancelled() }}
        continue-on-error: true
        run: |
          curl -s -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage \
            -d chat_id=${{ secrets.TELEGRAM_TO }} \
            -d parse_mode="Markdown" \
            -d text="⛔ *Build Di-cancel*%0ADevice: \`${{ github.event.inputs.DEVICE_NAME }}\`%0AROM: \`${{ github.event.inputs.ROM_FOLDER }}\`%0A[Lihat Run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})"

      # Stop crave kalau di-cancel
      - name: Stop crave on cancel
        if: ${{ cancelled() }}
        run: |
          cd $ROM_PATH
          crave stop --all || true
